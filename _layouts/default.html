<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }} — {{ site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body>
  <header>
    <nav>
      <a class="site-title" href="{{ '/' | relative_url }}">{{ site.author }}.dev</a>
      <div class="nav-links">
        <a href="{{ '/#portfolio' | relative_url }}">Portfolio</a>
        <a href="{{ '/' | relative_url }}">Blog</a>
        <a href="{{ '/categories' | relative_url }}">Categories</a>
        <a href="{{ '/about' | relative_url }}">About</a>
      </div>
    </nav>
  </header>
  <main>
    {{ content }}
  </main>
  <footer>
    <p>© {{ 'now' | date: "%Y" }} <strong>{{ site.author }}</strong> · Built with Jekyll &amp; ❤️</p>
  </footer>
</body>
</html>
