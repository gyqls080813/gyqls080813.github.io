---
layout: default
---

<style>
/* ============================================
   PROJECT DETAIL PAGE - APP SPLASH EXPERIENCE
   ============================================ */

/* Splash Overlay: Simulates an actual app launch */
.app-splash-overlay {
    position: fixed;
    inset: 0;
    z-index: 9999;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: {{ page.splash_bg | default: '#0a0a0c' }};
    transition: opacity 0.8s cubic-bezier(0.16, 1, 0.3, 1);
    pointer-events: auto;
}

.app-splash-overlay.dismissed {
    opacity: 0;
    pointer-events: none;
}

.app-splash-logo {
    max-width: 180px;
    animation: splashPulse 2s ease-in-out infinite;
}

.app-splash-text {
    margin-top: 1.5rem;
    font-size: 1.6rem;
    font-weight: 700;
    letter-spacing: 0.05em;
    color: #fff;
    opacity: 0;
    animation: splashFadeIn 0.8s 0.5s forwards;
}

.app-splash-loading {
    margin-top: 3rem;
    width: 40px;
    height: 40px;
    border: 3px solid rgba(255,255,255,0.1);
    border-top-color: rgba(255,255,255,0.7);
    border-radius: 50%;
    animation: splashSpin 0.8s linear infinite;
    opacity: 0;
    animation: splashSpin 0.8s linear infinite, splashFadeIn 0.5s 1s forwards;
}

@keyframes splashPulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.05); }
}

@keyframes splashFadeIn {
    to { opacity: 1; }
}

@keyframes splashSpin {
    to { transform: rotate(360deg); }
}

/* Main Content (hidden behind splash initially) */
.project-page-body {
    background: var(--bg-primary);
}

/* Hero Section: beneath the splash, a cinematic opening */
.project-hero {
    position: relative;
    width: 100%;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
}

.project-hero-bg {
    position: absolute;
    inset: 0;
    background-size: cover;
    background-position: center;
    filter: blur(20px) brightness(0.3);
    transform: scale(1.1);
    z-index: 0;
}

.project-hero-content {
    position: relative;
    z-index: 2;
    text-align: center;
    max-width: 700px;
    padding: 2rem;
}

.project-hero-content img {
    max-width: 120px;
    margin-bottom: 1.5rem;
    border-radius: 24px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.5);
}

.project-hero-content h1 {
    font-size: clamp(2.5rem, 6vw, 4.5rem);
    font-weight: 800;
    color: #fff;
    margin: 0 0 1rem 0;
    line-height: 1.1;
}

.project-hero-content p {
    font-size: 1.2rem;
    color: rgba(255,255,255,0.7);
    line-height: 1.6;
    margin: 0;
}

.project-hero-scroll-cue {
    position: absolute;
    bottom: 2.5rem;
    left: 50%;
    transform: translateX(-50%);
    z-index: 3;
    text-align: center;
}

.project-hero-scroll-cue p {
    font-size: 0.7rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.4);
    font-family: 'Fira Code', monospace;
    margin-bottom: 0.8rem;
}

.project-hero-scroll-cue .line {
    width: 2px; height: 50px;
    background: linear-gradient(to bottom, rgba(255,255,255,0.4), transparent);
    margin: 0 auto;
    animation: scrollDrop 2s ease-in-out infinite;
    transform-origin: top;
}

@keyframes scrollDrop {
    0% { transform: scaleY(0); opacity: 0; }
    30% { opacity: 1; }
    50% { transform: scaleY(1); }
    50.1% { transform-origin: bottom; }
    100% { transform: scaleY(0); transform-origin: bottom; opacity: 0; }
}

/* Article Body */
.project-article {
    background: var(--bg-primary);
    padding: 6rem 1.5rem;
    position: relative;
    z-index: 5;
}

.project-container {
    max-width: 820px;
    margin: 0 auto;
    font-size: 1.1rem;
    line-height: 1.9;
    color: var(--text-2);
}

.project-container h2 {
    font-size: 2rem;
    font-weight: 700;
    color: var(--text-1);
    margin: 5rem 0 1.5rem 0;
    padding-bottom: 0.5rem;
    border-bottom: 1px solid rgba(255,255,255,0.08);
}

.project-container h3 {
    font-size: 1.5rem;
    font-weight: 600;
    color: var(--text-1);
    margin: 3rem 0 1rem 0;
}

.project-container p {
    margin-bottom: 1.5rem;
}

.project-container img {
    max-width: 100%;
    height: auto;
    border-radius: 16px;
    margin: 2.5rem auto;
    display: block;
    box-shadow: 0 16px 60px rgba(0,0,0,0.6);
    border: 1px solid rgba(255,255,255,0.08);
}

.project-container ul, .project-container ol {
    margin-bottom: 2rem;
    padding-left: 1.5rem;
}

.project-container li {
    margin-bottom: 0.6rem;
}

.project-container blockquote {
    border-left: 4px solid var(--accent, #6366f1);
    background: var(--bg-card, #1a1a2e);
    padding: 1.2rem 1.5rem;
    margin: 2rem 0;
    border-radius: 0 12px 12px 0;
    font-style: italic;
    color: var(--text-2);
}

.project-container hr {
    border: none;
    height: 1px;
    background: rgba(255,255,255,0.06);
    margin: 4rem 0;
}

/* Feature Showcase Row */
.feature-showcase {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 2rem;
    margin: 3rem 0;
}

.feature-showcase img {
    margin: 0;
    width: 100%;
    border-radius: 12px;
}

@media (max-width: 700px) {
    .feature-showcase {
        grid-template-columns: 1fr;
    }
}

/* Back to Home Button */
.back-home-btn {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    padding: 0.8rem 2rem;
    background: rgba(255,255,255,0.06);
    color: var(--text-2);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 100px;
    text-decoration: none;
    font-size: 0.9rem;
    transition: all 0.3s ease;
    margin-top: 4rem;
}

.back-home-btn:hover {
    background: rgba(255,255,255,0.12);
    color: var(--text-1);
    transform: translateX(-4px);
}

/* Reveal animation for article sections */
.reveal {
    opacity: 0;
    transform: translateY(40px);
    transition: opacity 0.8s cubic-bezier(0.16, 1, 0.3, 1), transform 0.8s cubic-bezier(0.16, 1, 0.3, 1);
}
.reveal.visible {
    opacity: 1;
    transform: translateY(0);
}
</style>

<!-- ===== APP SPLASH SCREEN ===== -->
<div class="app-splash-overlay" id="appSplash">
    {% if page.splash_logo %}
    <img src="{{ page.splash_logo | relative_url }}" alt="{{ page.title }} Logo" class="app-splash-logo">
    {% endif %}
    <span class="app-splash-text">{{ page.title }}</span>
    <div class="app-splash-loading"></div>
</div>

<!-- ===== MAIN PAGE CONTENT ===== -->
<div class="project-page-body">
    
    <!-- Hero: cinematic opening after splash -->
    <div class="project-hero">
        <div class="project-hero-bg" style="background-image: url('{{ page.hero_bg | relative_url }}');"></div>
        <div class="project-hero-content">
            {% if page.app_icon %}
            <img src="{{ page.app_icon | relative_url }}" alt="{{ page.title }}">
            {% endif %}
            <h1>{{ page.title }}</h1>
            <p>{{ page.subtitle }}</p>
        </div>
        <div class="project-hero-scroll-cue">
            <p>Scroll to explore</p>
            <div class="line"></div>
        </div>
    </div>
    
    <!-- Article content from markdown -->
    <article class="project-article">
        <div class="project-container">
            {{ content }}
            
            <a href="{{ '/' | relative_url }}" class="back-home-btn">← 홈으로 돌아가기</a>
        </div>
    </article>
</div>

<script>
(function() {
    // 1. Splash screen auto-dismiss after simulated loading
    var splash = document.getElementById('appSplash');
    if (splash) {
        setTimeout(function() {
            splash.classList.add('dismissed');
            // Remove from DOM after transition
            setTimeout(function() {
                splash.remove();
            }, 900);
        }, 2200); // 2.2 second splash duration
    }

    // 2. Scroll reveal for article sections
    var revealObs = new IntersectionObserver(function(entries) {
        entries.forEach(function(entry) {
            if (entry.isIntersecting) {
                entry.target.classList.add('visible');
                revealObs.unobserve(entry.target);
            }
        });
    }, { threshold: 0.1, rootMargin: '0px 0px -50px 0px' });

    // Wrap h2, h3, p, img, blockquote, ul, ol in reveal class
    document.querySelectorAll('.project-container h2, .project-container h3, .project-container p, .project-container img, .project-container blockquote, .project-container ul, .project-container ol, .project-container hr, .feature-showcase').forEach(function(el) {
        el.classList.add('reveal');
        revealObs.observe(el);
    });

    // 3. Parallax for hero background
    var heroBg = document.querySelector('.project-hero-bg');
    window.addEventListener('scroll', function() {
        if (heroBg && window.scrollY < window.innerHeight) {
            heroBg.style.transform = 'scale(1.1) translateY(' + (window.scrollY * 0.3) + 'px)';
        }
    });
})();
</script>
