---
layout: default
---

<style>
/* Project Specific Isolated Styles */
.project-splash {
    position: relative;
    width: 100vw;
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    background-size: cover;
    background-position: center;
    background-attachment: fixed; /* Parallax effect base */
    overflow: hidden;
    margin-top: -60px; /* Offset global header if any */
}

.project-splash-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(to bottom, rgba(10,10,12,0.4) 0%, rgba(10,10,12,0.9) 100%);
    z-index: 1;
}

.project-splash-content {
    position: relative;
    text-align: center;
    z-index: 2;
    padding: 2rem;
    max-width: 800px;
}

.project-splash-title {
    font-size: clamp(3rem, 8vw, 6rem);
    font-weight: 800;
    letter-spacing: -0.02em;
    margin: 0 0 1rem 0;
    color: var(--text-1);
    line-height: 1.1;
}

.project-splash-subtitle {
    font-size: clamp(1.2rem, 3vw, 1.8rem);
    color: var(--text-2);
    font-weight: 400;
    margin: 0 0 3rem 0;
}

.live-app-btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    padding: 1rem 2.5rem;
    background: var(--text-1);
    color: var(--bg-primary);
    font-size: 1.1rem;
    font-weight: 600;
    border-radius: 100px;
    text-decoration: none;
    transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1), background 0.3s ease;
}

.live-app-btn:hover {
    transform: translateY(-4px);
    background: var(--accent, #6366f1);
    color: #fff;
}

.scroll-indicator {
    position: absolute;
    bottom: 2rem;
    left: 50%;
    transform: translateX(-50%);
    z-index: 2;
    text-align: center;
}

.scroll-indicator p {
    font-size: 0.75rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--text-3);
    margin-bottom: 1rem;
    font-family: 'Fira Code', monospace;
}

.scroll-line {
    width: 2px;
    height: 60px;
    background: linear-gradient(to bottom, var(--text-3) 0%, transparent 100%);
    margin: 0 auto;
    animation: scrollDrop 2s ease-in-out infinite;
    transform-origin: top;
}

@keyframes scrollDrop {
    0% { transform: scaleY(0); transform-origin: top; }
    50% { transform: scaleY(1); transform-origin: top; }
    50.1% { transform: scaleY(1); transform-origin: bottom; }
    100% { transform: scaleY(0); transform-origin: bottom; }
}

.project-article {
    background: var(--bg-primary);
    position: relative;
    z-index: 10;
    padding: 6rem 1.5rem;
}

.project-container {
    max-width: 800px;
    margin: 0 auto;
    font-size: 1.15rem;
    line-height: 1.8;
    color: var(--text-2);
}

.project-container h1, .project-container h2, .project-container h3 {
    color: var(--text-1);
    margin-top: 3.5rem;
    margin-bottom: 1.5rem;
    font-weight: 700;
}

.project-container h2 {
    font-size: 2.2rem;
    padding-bottom: 0.5rem;
    border-bottom: 1px solid rgba(255,255,255,0.1);
}

.project-container h3 {
    font-size: 1.6rem;
}

.project-container p {
    margin-bottom: 1.8rem;
}

.project-container img {
    max-width: 100%;
    height: auto;
    border-radius: 12px;
    margin: 3rem 0;
    box-shadow: 0 20px 40px rgba(0,0,0,0.5);
    border: 1px solid rgba(255,255,255,0.1);
}

.project-container ul, .project-container ol {
    margin-bottom: 2rem;
    padding-left: 1.5rem;
}

.project-container li {
    margin-bottom: 0.8rem;
}

.project-container blockquote {
    border-left: 4px solid var(--accent, #6366f1);
    padding: 1rem 0 1rem 1.5rem;
    margin: 2rem 0;
    font-style: italic;
    background: var(--bg-card);
    border-radius: 0 8px 8px 0;
}

/* Base fade-up animations for project layout */
.fade-up {
    opacity: 0;
    transform: translateY(30px);
    transition: opacity 1s cubic-bezier(0.16, 1, 0.3, 1), transform 1s cubic-bezier(0.16, 1, 0.3, 1);
}
.fade-up.visible {
    opacity: 1;
    transform: translateY(0);
}
</style>

<!-- Project Details Splash Screen -->
<div class="project-splash" style="background-image: url('{{ page.splash_img | relative_url }}');">
    <div class="project-splash-overlay"></div>
    <div class="project-splash-content fade-up">
        <h1 class="project-splash-title">{{ page.title }}</h1>
        <p class="project-splash-subtitle">{{ page.subtitle }}</p>
        {% if page.live_url %}
        <a href="{{ page.live_url }}" target="_blank" class="live-app-btn">실제 앱 경험해보기 ↗</a>
        {% endif %}
    </div>
    <div class="scroll-indicator fade-up" style="animation-delay: 0.5s;">
        <p>Scroll to read case study</p>
        <div class="scroll-line"></div>
    </div>
</div>

<!-- Main Portfolio Content -->
<article class="project-article">
    <div class="project-container">
        {{ content }}
    </div>
</article>

<script>
    // Reveal animations on load
    document.addEventListener("DOMContentLoaded", function() {
        setTimeout(function() {
            document.querySelectorAll('.fade-up').forEach(function(el) {
                el.classList.add('visible');
            });
        }, 100);
        
        // Parallax scroll effect for splash screen
        var splashTitle = document.querySelector('.project-splash-content');
        var splashOverlay = document.querySelector('.project-splash-overlay');
        
        window.addEventListener('scroll', function() {
            var scrolled = window.scrollY;
            if(scrolled < window.innerHeight) {
                // Dim the image further and shift text up slowly
                if(splashTitle) splashTitle.style.transform = 'translateY(' + (scrolled * 0.3) + 'px)';
                if(splashTitle) splashTitle.style.opacity = 1 - (scrolled / window.innerHeight * 1.5);
                if(splashOverlay) splashOverlay.style.background = 'linear-gradient(to bottom, rgba(10,10,12,' + (0.4 + (scrolled/window.innerHeight)*0.6) + ') 0%, rgba(10,10,12,1) 100%)';
            }
        });
    });
</script>
