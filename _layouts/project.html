---
layout: default
---

<style>
/* ============================================
   STEP-BY-STEP APP WALKTHROUGH PRESENTATION
   ============================================ */

/* Splash Overlay */
.app-splash-overlay {
    position: fixed;
    inset: 0;
    z-index: 9999;
    background: #0f0f0f;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    transition: opacity 1s cubic-bezier(0.16, 1, 0.3, 1);
}
.app-splash-overlay.dismissed {
    opacity: 0;
    pointer-events: none;
}
.splash-center { display: flex; flex-direction: column; align-items: center; }
.splash-logo-box { position: relative; width: 300px; height: 300px; }
@media (min-width: 600px) { .splash-logo-box { width: 400px; height: 400px; } }
.splash-logo-box img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: contain; }

@keyframes red-neon-flicker {
    0%, 15%, 25%, 35%, 100% { opacity: 1; filter: drop-shadow(0 0 15px rgba(255,0,0,0.9)) drop-shadow(0 0 30px rgba(255,0,0,0.7)); }
    10%, 20%, 30% { opacity: 0.1; filter: none; }
}
@keyframes chr-light-subtle {
    0%, 15%, 25%, 35%, 100% { filter: brightness(1.05) drop-shadow(0 0 10px rgba(255,0,0,0.4)); }
    10%, 20%, 30% { filter: brightness(0.8); }
}
.splash-chr { z-index: 10; animation: chr-light-subtle 1.5s ease-in-out forwards; }
.splash-logo-text { z-index: 20; animation: red-neon-flicker 1.5s ease-in-out forwards; }
.splash-tagline { margin-top: -10px; z-index: 30; filter: drop-shadow(0 0 8px rgba(255,255,255,0.5)); }
.splash-tagline p { color: #fff; font-size: 1.2rem; font-weight: 900; letter-spacing: 0.25em; text-transform: uppercase; font-style: italic; margin: 0; }
@media (min-width: 600px) { .splash-tagline p { font-size: 1.6rem; } }

/* ---- Presentation Container ---- */
.pres-wrapper {
    position: fixed;
    inset: 0;
    background: #0a0a0c;
    z-index: 100;
    overflow: hidden;
    display: none; /* shown after splash */
}

.pres-wrapper.active {
    display: block;
}

/* Single Slide */
.pres-slide {
    position: absolute;
    inset: 0;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.6s cubic-bezier(0.16, 1, 0.3, 1);
}

.pres-slide.active {
    opacity: 1;
    pointer-events: auto;
}

/* Base App Screen Background */
.pres-screen {
    position: absolute;
    inset: 0;
    background: #000;
    z-index: 1;
}

.pres-screen img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center top;
}

/* Right: Glassmorphic Overlay Panel */
.pres-info {
    position: absolute;
    top: 0;
    bottom: 0;
    right: 0;
    width: 450px;
    z-index: 2;
    background: rgba(17, 17, 22, 0.85);
    backdrop-filter: blur(20px);
    border-left: 1px solid rgba(255,255,255,0.08);
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 3rem;
    box-shadow: -10px 0 50px rgba(0,0,0,0.5);
}

.pres-step-label {
    font-size: 0.7rem;
    font-family: 'Fira Code', monospace;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.3);
    margin-bottom: 1.5rem;
}

.pres-title {
    font-size: 1.8rem;
    font-weight: 800;
    color: #fff;
    margin: 0 0 1rem 0;
    line-height: 1.2;
}

.pres-desc {
    font-size: 1rem;
    line-height: 1.8;
    color: rgba(255,255,255,0.6);
    margin: 0 0 2rem 0;
}

.pres-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem;
    margin-bottom: 2rem;
}

.pres-tag {
    padding: 0.3rem 0.8rem;
    background: rgba(220,38,38,0.1);
    border: 1px solid rgba(220,38,38,0.2);
    border-radius: 100px;
    font-size: 0.75rem;
    color: #f87171;
    font-weight: 500;
}

/* Navigation */
.pres-nav {
    position: absolute;
    bottom: 2.5rem;
    left: 3rem;
    right: 3rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
}

.pres-nav-btn {
    padding: 0.7rem 1.5rem;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 8px;
    color: rgba(255,255,255,0.7);
    font-size: 0.85rem;
    cursor: pointer;
    transition: all 0.2s ease;
    font-family: inherit;
}

.pres-nav-btn:hover {
    background: rgba(255,255,255,0.12);
    color: #fff;
}

.pres-nav-btn.primary {
    background: #dc2626;
    border-color: #dc2626;
    color: #fff;
}

.pres-nav-btn.primary:hover {
    background: #b91c1c;
}

.pres-progress {
    display: flex;
    gap: 6px;
}

.pres-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: rgba(255,255,255,0.15);
    transition: all 0.3s ease;
}

.pres-dot.active {
    background: #dc2626;
    box-shadow: 0 0 8px rgba(220,38,38,0.5);
}

/* Home button */
.pres-home-btn {
    position: absolute;
    top: 1.5rem;
    left: 1.5rem;
    z-index: 50;
    padding: 0.5rem 1rem;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 8px;
    color: rgba(255,255,255,0.5);
    text-decoration: none;
    font-size: 0.8rem;
    transition: all 0.2s ease;
}

.pres-home-btn:hover {
    background: rgba(255,255,255,0.12);
    color: #fff;
}

/* Mobile: Adapt */
@media (max-width: 900px) {
    .pres-info { 
        width: 100%;
        height: 50vh;
        top: auto;
        bottom: 0;
        border-left: none;
        border-top: 1px solid rgba(255,255,255,0.08);
        padding: 2rem;
        overflow-y: auto;
    }
    .pres-screen {
        bottom: 50vh;
    }
    .pres-nav { bottom: 1.5rem; left: 2rem; right: 2rem; }
}
</style>

<!-- ===== SPLASH ===== -->
<div class="app-splash-overlay" id="appSplash">
    <div class="splash-center">
        <div class="splash-logo-box">
            {% if page.splash_chr %}
            <img src="{{ page.splash_chr | relative_url }}" alt="Character" class="splash-chr">
            {% endif %}
            {% if page.splash_logo %}
            <img src="{{ page.splash_logo | relative_url }}" alt="Logo" class="splash-logo-text">
            {% endif %}
        </div>
        {% if page.splash_tagline %}
        <div class="splash-tagline">
            <p>{{ page.splash_tagline }}</p>
        </div>
        {% endif %}
    </div>
</div>

<!-- ===== STEP-BY-STEP PRESENTATION ===== -->
<div class="pres-wrapper" id="presWrapper">
    <a href="{{ '/' | relative_url }}" class="pres-home-btn">← 홈으로</a>

    {{ content }}

    <script>
    (function() {
        var slides = document.querySelectorAll('.pres-slide');
        var dots = document.querySelectorAll('.pres-dot');
        var current = 0;

        function goTo(idx) {
            if (idx < 0 || idx >= slides.length) return;
            slides[current].classList.remove('active');
            if(dots[current]) dots[current].classList.remove('active');
            current = idx;
            slides[current].classList.add('active');
            if(dots[current]) dots[current].classList.add('active');
        }

        // Show first slide
        if(slides.length > 0) {
            slides[0].classList.add('active');
            if(dots[0]) dots[0].classList.add('active');
        }

        // Navigation buttons
        document.querySelectorAll('[data-pres-prev]').forEach(function(btn) {
            btn.addEventListener('click', function() { goTo(current - 1); });
        });
        document.querySelectorAll('[data-pres-next]').forEach(function(btn) {
            btn.addEventListener('click', function() { goTo(current + 1); });
        });

        // Keyboard navigation
        document.addEventListener('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); goTo(current + 1); }
            if (e.key === 'ArrowLeft') { e.preventDefault(); goTo(current - 1); }
        });
    })();
    </script>
</div>

<script>
// Splash -> Presentation transition
(function() {
    var splash = document.getElementById('appSplash');
    var pres = document.getElementById('presWrapper');
    
    setTimeout(function() {
        splash.classList.add('dismissed');
        pres.classList.add('active');
        setTimeout(function() { splash.remove(); }, 1100);
    }, 3000);
})();
</script>
