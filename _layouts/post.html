---
layout: default
---
<article>
  <div class="post-header">
    <p class="post-meta">{{ page.date | date: "%Y.%m.%d" }}{% if page.categories %} · {% for cat in page.categories %}<a
        href="{{ '/categories/' | append: cat | relative_url }}" class="cat-tag">{{ cat }}</a>{% endfor %}{% endif %}
    </p>
    <h1>{{ page.title }}</h1>
  </div>
  {{ content }}
</article>
