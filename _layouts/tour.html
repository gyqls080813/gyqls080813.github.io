---
layout: default
---
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          background: '#121212',
          primary: '#dc2626'
        }
      }
    }
  }
</script>

<style>
/* ============================================
   INTERACTIVE APP TOUR PROTOTYPE
   ============================================ */

/* Global App Shell */
.app-shell {
    position: fixed;
    inset: 0;
    background: #000;
    z-index: 100;
    display: flex;
    flex-direction: column;
    overflow: hidden;
}

/* Mock Header Navigation */
.app-header {
    height: 70px;
    background: rgba(20,20,20,0.95);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid rgba(255,255,255,0.1);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 2rem;
    z-index: 50;
    position: relative;
    flex-shrink: 0;
}

.header-logo {
    display: flex;
    align-items: center;
    gap: 10px;
}

.header-logo img {
    height: 32px;
}

.header-nav {
    display: flex;
    gap: 20px;
}

.nav-item {
    padding: 8px 16px;
    border-radius: 8px;
    color: rgba(255,255,255,0.7);
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
}

.nav-item:hover {
    background: rgba(255,255,255,0.1);
    color: #fff;
}

.nav-item.active {
    color: #fff;
    background: rgba(220,38,38,0.2);
}

.header-actions {
    display: flex;
    align-items: center;
    gap: 15px;
}

.action-icon {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: rgba(255,255,255,0.1);
    display: flex;
    align-items: center;
    justify-content: center;
    color: #fff;
    font-size: 1.2rem;
    cursor: pointer;
    transition: background 0.2s;
    position: relative; /* for hotspots */
}

.action-icon:hover {
    background: rgba(255,255,255,0.2);
}

.action-icon.mypage-btn {
    background: #27272a;
    border: 1px solid rgba(255,255,255,0.1);
    overflow: hidden;
}
.action-icon.mypage-btn img {
    width: 100%; height: 100%; object-fit: cover;
}

/* Home Return Button */
.tour-home-btn {
    position: fixed;
    top: 15px;
    right: 20px;
    z-index: 200;
    padding: 6px 14px;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 6px;
    color: rgba(255,255,255,0.7);
    text-decoration: none;
    font-size: 0.8rem;
    pointer-events: auto;
}
.tour-home-btn:hover { background: rgba(255,255,255,0.15); color: #fff; }

/* Viewport Area (Screens go here) */
.app-viewport {
    flex: 1;
    position: relative;
    background: #0a0a0c;
    overflow: hidden;
}

.screen-view {
    position: absolute;
    inset: 0;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.5s ease;
}

.screen-view.active {
    opacity: 1;
    pointer-events: auto;
    z-index: 10;
}

/* Custom CSS generated screens (e.g. MyPage Mockup) */
.mockup-container {
    width: 100%;
    height: 100%;
    background: #111116;
    padding: 3rem;
    overflow-y: auto;
    display: none; /* hidden if not active */
}

.screen-view.active .mockup-container {
    display: block;
}

/* Disable global scroll when in prototype mode */
body { overflow: hidden; }
</style>

<div class="app-shell">
    <!-- Removed tour-home-btn as requested -->

    <!-- MOCK HEADER (To be driven by withy.md or injected content) -->
    
    <!-- MAIN VIEWPORT -->
    <div class="app-viewport flex flex-col h-full bg-background" style="flex:1;">
        <!-- Rendered screens driven by Markdown data JSON/HTML -->
        <div id="screens-container" class="w-full h-full">
            {{ content }} <!-- Markdown content will provide hidden HTML data -->
        </div>
    </div>
</div>

<!-- Prototype Router Engine -->
<script>
window.switchScreen = function(screenId) {
    var screens = document.querySelectorAll('.t-screen');
    screens.forEach(function(s) {
        s.classList.remove('active'); // hides screen
    });
    var target = document.getElementById(screenId);
    if(target) {
        target.classList.add('active'); // shows target screen
    }
    // Lazy-load YouTube iframe only when entering screen-room
    var iframe = document.getElementById('room-iframe');
    if (iframe) {
        if (screenId === 'screen-room') {
            if (!iframe.src || iframe.src === 'about:blank' || iframe.src === '') {
                iframe.src = iframe.getAttribute('data-src') || '';
            }
        } else {
            iframe.src = 'about:blank'; // stop video when leaving room
        }
    }
};

document.addEventListener("DOMContentLoaded", function() {
    // Initial start: Splash if exists, or Home
    var startScreen = document.getElementById('screen-splash') ? 'screen-splash' : 'screen-home';
    window.switchScreen(startScreen);

    // If Splash screen exists, auto-navigate to Home after 3.5s
    if (startScreen === 'screen-splash') {
        setTimeout(function() {
            var splashEl = document.getElementById('screen-splash');
            // Check if splash is still active (user didn't manually skip it)
            if (splashEl && splashEl.classList.contains('active')) {
                window.switchScreen('screen-home');
            }
        }, 3500);
    }
});
</script>
